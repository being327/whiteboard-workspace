<!DOCTYPE html>
<html>

<head>

<title>Whiteboard Workspace</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

header{
background:#222;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

button{
padding:10px 20px;
font-size:16px;
margin-bottom:20px;
}

.board{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
cursor:pointer;
}

.board:hover{
background:#fafafa;
}

</style>

</head>

<body>

<header>

<h2>My Whiteboard Workspace</h2>

</header>

<div class="container">

<button onclick="createBoard()">+ Create Project</button>

<div id="boards"></div>

</div>

<script>

// 🔴 PASTE YOUR FIREBASE CONFIG HERE

const firebaseConfig = {
apiKey: "PASTE",
authDomain: "PASTE",
projectId: "PASTE",
storageBucket: "PASTE",
messagingSenderId: "PASTE",
appId: "PASTE"
};

firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()

function loadBoards(){

db.collection("boards").orderBy("created").onSnapshot(snapshot=>{

const container=document.getElementById("boards")

container.innerHTML=""

snapshot.forEach(doc=>{

const data=doc.data()

let div=document.createElement("div")

div.className="board"

div.innerText=data.name

div.onclick=function(){

localStorage.setItem("currentBoard",data.id)

window.location="board.html"

}

container.appendChild(div)

})

})

}

function createBoard(){

let name=prompt("Enter project name")

if(!name) return

let id="board-"+Date.now()

db.collection("boards").add({

name:name,
id:id,
created:Date.now()

})

}

loadBoards()

</script>

</body>

</html>
