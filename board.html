<!DOCTYPE html>
<html>

<head>
<title>Board</title>

<style>
body{
margin:0;
}
iframe{
width:100%;
height:100vh;
border:none;
}
</style>

</head>

<body>

<iframe id="boardFrame"></iframe>

<script>

const params = new URLSearchParams(window.location.search);

const id = params.get("id");
const key = params.get("key");

document.getElementById("boardFrame").src =
"https://excalidraw.com/#room="+id+","+key;

</script>

</body>

</html>
