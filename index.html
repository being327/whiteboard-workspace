<!DOCTYPE html>
<html>

<head>
<title>Whiteboard Workspace</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

button{
padding:10px 20px;
font-size:16px;
margin:20px;
}

.board{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
cursor:pointer;
}

</style>
</head>

<body>

<h2>My Whiteboard Workspace</h2>

<div class="container">

<button onclick="createBoard()">Create Project</button>

<div id="boards"></div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyCj4Gu_GtOfZKqZ_ig3mhDs0viUbOnwtQ8",
authDomain: "whiteboard-cloud-54238.firebaseapp.com",
projectId: "whiteboard-cloud-54238",
storageBucket: "whiteboard-cloud-54238.firebasestorage.app",
messagingSenderId: "337433152259",
appId: "1:337433152259:web:28e38ff06ea95738e53736"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function loadBoards(){

db.collection("boards").onSnapshot(snapshot=>{

const container=document.getElementById("boards");
container.innerHTML="";

snapshot.forEach(doc=>{

const data=doc.data();

let div=document.createElement("div");

div.className="board";
div.innerText=data.name;

div.onclick=function(){

window.open("board.html?id="+data.id,"_blank");

};

container.appendChild(div);

});

});

}

function createBoard(){

let name=prompt("Enter project name");

if(!name) return;

let id="board-"+Date.now();

db.collection("boards").add({
name:name,
id:id
});

}

loadBoards();

</script>

</body>
</html>
