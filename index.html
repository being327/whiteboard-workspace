<!DOCTYPE html>
<html>
<head>

<title>Whiteboard Workspace</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

.container{
max-width:700px;
margin:auto;
}

.board{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
cursor:pointer;
}

button{
padding:10px 20px;
margin:20px;
font-size:16px;
}

</style>

</head>

<body>

<h2>My Whiteboard Workspace</h2>

<button onclick="createBoard()">Create Project</button>

<div id="boards" class="container"></div>

<script>

function loadBoards(){

let boards = JSON.parse(localStorage.getItem("boards")) || []

let container = document.getElementById("boards")

container.innerHTML=""

boards.forEach(board=>{

let div=document.createElement("div")

div.className="board"

div.innerText=board.name

div.onclick=()=>{

window.open("https://excalidraw.com/#room="+board.id+","+board.key,"_blank")

}

container.appendChild(div)

})

}

function createBoard(){

let name=prompt("Project name")

if(!name) return

let boards = JSON.parse(localStorage.getItem("boards")) || []

let id="board-"+Date.now()
let key=Math.random().toString(36).substring(2)

boards.push({name,id,key})
  
localStorage.setItem("boards",JSON.stringify(boards))

loadBoards()

}

loadBoards()

</script>

</body>
</html>
