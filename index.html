<!DOCTYPE html>
<html>
<head>

<title>My Whiteboards</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

.container{
max-width:700px;
margin:auto;
}

.board{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
cursor:pointer;
}

button{
padding:10px 20px;
font-size:16px;
margin:20px;
}

</style>

</head>

<body>

<h1>My Whiteboard Workspace</h1>

<button onclick="createBoard()">+ Create New Project</button>

<div id="boards" class="container"></div>

<script>

function loadBoards(){

let boards = JSON.parse(localStorage.getItem("boards")) || []

let container = document.getElementById("boards")

container.innerHTML=""

boards.forEach(board => {

let div = document.createElement("div")

div.className="board"

div.innerText=board.name

div.onclick=()=>{

window.location.href="https://excalidraw.com/#room="+board.id

}

container.appendChild(div)

})

}

function createBoard(){

let name = prompt("Enter project name")

if(!name) return

let id = name.toLowerCase().replace(/\s/g,"") + Date.now()

let boards = JSON.parse(localStorage.getItem("boards")) || []

boards.push({name,id})

localStorage.setItem("boards",JSON.stringify(boards))

loadBoards()

}

loadBoards()

</script>

</body>
</html>
